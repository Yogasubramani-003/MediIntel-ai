apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediintel-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediintel-web
  template:
    metadata:
      labels:
        app: mediintel-web
    spec:
      containers:
        - name: mediintel-web
          image: mediintel-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg2://postgres:postgres@mediintel-db:5432/mediintel
            - name: UPLOAD_FOLDER
              value: /app/uploads
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediintel-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediintel-db
  template:
    metadata:
      labels:
        app: mediintel-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mediintel-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediintel-postgres
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: mediintel
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
