version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mediintel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  web:
    build: .
    depends_on:
      - db
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/mediintel
      UPLOAD_FOLDER: /app/uploads
    volumes:
      - .:/app
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
